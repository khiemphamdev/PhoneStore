<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">PhoneStore Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { overflow-x: hidden; }
        /* CSS tùy biến cho Sidebar cố định bên trái */
        .sidebar {
            min-height: 100vh;
            width: 260px;
            background-color: #212529;
            color: white;
            transition: all 0.3s;
        }
        .sidebar .nav-link {
            color: #dee2e6;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background-color: #343a40;
            color: #fff;
            border-left: 4px solid #0d6efd;
        }
        .admin-logo {
            padding: 20px;
            font-size: 1.25rem;
            font-weight: bold;
            background-color: #1a1d20;
            text-align: center;
        }
        .main-content { flex: 1; }
    </style>
</head>
<body>

<div class="d-flex">
    <div class="sidebar d-flex flex-column flex-shrink-0">
        <div class="admin-logo">
            <i class="fa-solid :fa-mobile-screen-button text-primary"></i> PHONE STORE
        </div>
        <hr class="m-0 text-secondary">
        <ul class="nav nav-pills flex-column mb-auto pt-2">
            <li class="nav-item">
                <a th:href="@{/admin/dashboard}" class="nav-link">
                    <i class="fa-solid :fa-chart-pie" style="width: 20px;"></i> Dashboard
                </a>
            </li>
            <li>
                <a th:href="@{/admin/categories}" class="nav-link ">
                    <i class="fa-solid :fa-tags" style="width: 20px;"></i> Quản lý danh mục
                </a>
            </li>
            <li>
                <a th:href="@{/admin/products}" class="nav-link">
                    <i class="fa-solid :fa-box-open" style="width: 20px;"></i> Quản lý sản phẩm
                </a>
            </li>
            <li>
                <a th:href="@{/admin/orders}" class="nav-link">
                    <i class="fa-solid :fa-cart-shopping" style="width: 20px;"></i> Quản lý đơn hàng
                </a>
            </li>
            <li>
                <a th:href="@{/admin/users}" class="nav-link">
                    <i class="fa-solid :fa-users" style="width: 20px;"></i> Quản lý tài khoản
                </a>
            </li>
            <li>
                <a th:href="@{/logout}" class="nav-link" title="Đăng xuất"><i class="fa-solid :fa-users red" style="width: 20px;"></i>
                Đăng xuất
            </a>
            </li>
        </ul>
        <hr class="text-secondary m-0">
        <div class="p-3 bg-dark d-flex justify-content-between align-items-center">
            <span class="small text-muted"><i class="fa-solid :fa-user-gear"></i> Xin chào, Admin</span>
            
        </div>
    </div>

    <div class="main-content d-flex flex-column bg-light">
        <nav class="navbar navbar-expand navbar-white bg-white shadow-sm px-4 py-3">
            <span class="navbar-text fw-semibold text-secondary">
                Hệ Thống Quản Trị Cửa Hàng Điện Thoại
            </span>
        </nav>

        <div class="container-fluid p-4" layout:fragment="content">
            </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
