<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>Tổng Quan Hệ Thống</title>
</head>
<body>

<div layout:fragment="content">
    <div class="row g-4 mb-4">
        <div class="col-12 col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm bg-danger text-white h-100">
                <div class="card-body d-flex align-items-center justify-content-between p-4">
                    <div>
                        <h6 class="text-white-50 small text-uppercase mb-2 fw-bold">Tổng doanh thu</h6>
                        <h3 class="mb-0 fw-bold" th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</h3>
                    </div>
                    <div class="fs-1 opacity-50">
                        <i class="fa-solid :fa-money-bill-wave"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm bg-success text-white h-100">
                <div class="card-body d-flex align-items-center justify-content-between p-4">
                    <div>
                        <h6 class="text-white-50 small text-uppercase mb-2 fw-bold">Đơn hoàn thành</h6>
                        <h3 class="mb-0 fw-bold" th:text="${completedOrders}">0</h3>
                    </div>
                    <div class="fs-1 opacity-50">
                        <i class="fa-solid :fa-circle-check"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm bg-primary text-white h-100">
                <div class="card-body d-flex align-items-center justify-content-between p-4">
                    <div>
                        <h6 class="text-white-50 small text-uppercase mb-2 fw-bold">Số máy đã bán</h6>
                        <h3 class="mb-0 fw-bold" th:text="${productsSold}">0</h3>
                    </div>
                    <div class="fs-1 opacity-50">
                        <i class="fa-solid :fa-mobile-screen"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm bg-warning text-dark h-100">
                <div class="card-body d-flex align-items-center justify-content-between p-4">
                    <div>
                        <h6 class="text-dark-50 small text-uppercase mb-2 fw-bold">Tổng số khách hàng</h6>
                        <h3 class="mb-0 fw-bold" th:text="${totalCustomers}">0</h3>
                    </div>
                    <div class="fs-1 opacity-50">
                        <i class="fa-solid :fa-users"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0 p-4 bg-white">
        <h4 class="text-dark fw-bold mb-2">Chào mừng trở lại, Quản trị viên!</h4>
        <p class="text-muted mb-0">Hệ thống đang hoạt động ổn định. Sử dụng thanh công cụ bên trái (Sidebar) để chuyển hướng sang các khu vực quản lý dữ liệu chi tiết.</p>
    </div>
</div>

</body>
</html>
