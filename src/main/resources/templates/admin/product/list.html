<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>Quản Lý Sản Phẩm Điện Thoại</title>
</head>
<body>

<div layout:fragment="content">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="fa-solid :fa-box-open"></i> Danh Sách Điện Thoại</h5>
            <a th:href="@{/admin/products/new}" class="btn btn-light btn-sm fw-bold">
                <i class="fa-solid :fa-plus"></i> Thêm Điện Thoại Mới
            </a>
        </div>
        <div class="card-body">
            
            <form th:action="@{/admin/products}" method="get" class="row g-3 mb-4 bg-light p-3 rounded border">
                <div class="col-md-5">
                    <label class="form-label small fw-bold text-muted">Tìm kiếm theo tên</label>
                    <input type="text" name="keyword" th:value="${selectedKeyword}" 
                           class="form-control" placeholder="Nhập tên điện thoại cần tìm...">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-muted">Lọc theo hãng</label>
                    <select name="categoryId" class="form-select">
                        <option value="">-- Tất cả các hãng --</option>
                        <option th:each="cat : ${categories}" 
                                th:value="${cat.id}" 
                                th:text="${cat.name}"
                                th:selected="${cat.id == selectedCategoryId}">Tên hãng</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end gap-2">
                    <button type="submit" class="btn btn-primary w-40">
                        <i class="fa-solid :fa-magnifying-glass"></i> Tìm kiếm
                    </button>
                    <a th:href="@{/admin/products}" class="btn btn-secondary" title="Xóa bộ lọc">
                        xóa
                    </a>
                </div>
            </form>

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fa-solid :fa-circle-check"></i> <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fa-solid :fa-circle-exclamation"></i> <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle mb-0">
                    <thead class="table-dark text-center">
                        <tr>
                            <th style="width: 5%;">ID</th>
                            <th style="width: 10%;">Hình ảnh</th>
                            <th>Tên Điện Thoại</th>
                            <th style="width: 15%;">Hãng</th>
                            <th style="width: 15%;">Giá Bán</th>
                            <th style="width: 10%;">Kho hàng</th>
                            <th style="width: 15%;">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td class="text-center fw-bold" th:text="${product.id}">1</td>
                            <td class="text-center">
                                <img th:src="${product.image != null && product.image != ''} ? ${product.image} : 'https://placehold.co/100x100?text=No+Image'" 
                                     class="img-thumbnail" style="max-height: 60px; object-fit: contain;">
                            </td>
                            <td>
                                <span class="fw-bold text-dark" th:text="${product.name}">iPhone 15</span>
                            </td>
                            <td class="text-center">
                                <span class="badge bg-info text-dark fw-semibold" 
                                      th:text="${product.category != null} ? ${product.category.name} : 'Chưa phân loại'">Hãng</span>
                            </td>
                            <td class="text-end text-danger fw-bold" 
                                th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                            <td class="text-center" th:text="${product.inventory}">0</td>
                            <td class="text-center">
                                <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm me-1">
                                    <i class="fa-solid :fa-pen-to-square"></i> Sửa
                                </a>
                                <a th:href="@{/admin/products/delete/{id}(id=${product.id})}" 
                                   class="btn btn-danger btn-sm" 
                                   onclick="return confirm('Bạn có chắc chắn muốn xóa điện thoại này?')">
                                    <i class="fa-solid :fa-trash"></i> Xóa
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="7" class="text-center text-muted py-4">Không tìm thấy sản phẩm điện thoại nào phù hợp.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
